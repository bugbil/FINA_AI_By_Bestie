/* ================================================================
   ANALYSIS HELPERS
   ================================================================ */
function computeAnalysis(k) {
  if (!k) return {};
  const trx = getTrxForKonsumen(k);
  const cleanTrx = trx.filter(t => !t.selfTransfer);
  const totalKredit = cleanTrx.filter(t => t.amount > 0).reduce((a, b) => a + b.amount, 0);
  const totalDebit = cleanTrx.filter(t => t.amount < 0).reduce((a, b) => a + Math.abs(b.amount), 0);
  const avgKredit = Math.round(totalKredit / k.months);
  const avgIncome = k.income;
  const months = ["2025-01", "2025-02", "2025-03"];
  const monthlySurplus = months.map(m => {
    const mTrx = cleanTrx.filter(t => t.date.startsWith(m));
    const cr = mTrx.filter(t => t.amount > 0).reduce((a, b) => a + b.amount, 0);
    const db = mTrx.filter(t => t.amount < 0).reduce((a, b) => a + Math.abs(b.amount), 0);
    return cr - db;
  });
  const positiveSurplusCount = monthlySurplus.filter(s => s > 0).length;
  const maxSurplus = Math.max(...monthlySurplus);
  const minSurplus = Math.min(...monthlySurplus);
  const surplusStable = maxSurplus > 0 && minSurplus > 0 ? (minSurplus / maxSurplus) > 0.4 : monthlySurplus.every(s => s <= 0) ? true : false;
  const angsuranTrx = trx.filter(t => t.angsuran);
  const uniqueAngsuran = {};
  angsuranTrx.forEach(t => { const lbl = t.angsuranLabel || t.desc; if (!uniqueAngsuran[lbl]) uniqueAngsuran[lbl] = []; uniqueAngsuran[lbl].push(Math.abs(t.amount)); });
  const angsuranPerMonth = Object.entries(uniqueAngsuran).map(([label, amounts]) => ({ label, perMonth: Math.round(amounts.reduce((a,b)=>a+b,0) / k.months) }));
  const totalAngsuranPerMonth = angsuranPerMonth.reduce((a,b) => a + b.perMonth, 0);
  const dsr = avgIncome > 0 ? Math.round((totalAngsuranPerMonth / avgIncome) * 100) : 0;
  const utilityTrx = trx.filter(t => t.utility);
  const utilityByType = {};
  utilityTrx.forEach(t => { if (!utilityByType[t.utility]) utilityByType[t.utility] = []; utilityByType[t.utility].push(Math.abs(t.amount)); });
  const utilityAvg = Object.entries(utilityByType).map(([type, amounts]) => ({
    type, avgPerMonth: Math.round(amounts.reduce((a,b)=>a+b,0) / k.months),
    idPelanggan: type === "listrik" ? (trx.find(t => t.utility === "listrik")?.desc.match(/ID PEL (\d+)/)?.[1] || "-") : type === "pdam" ? (trx.find(t => t.utility === "pdam")?.desc.match(/ID PEL (\d+)/)?.[1] || "-") : "-",
  }));
  const anomaliTrx = trx.filter(t => t.anomali);
  const pinjolTrx = trx.filter(t => t.flag);
  const pinjolCount = pinjolTrx.length;
  const selfTransferTrx = trx.filter(t => t.selfTransfer);
  const totalSelfTransfer = selfTransferTrx.filter(t => t.amount > 0).reduce((a,b) => a + b.amount, 0);
  const atasNamaTrx = trx.filter(t => t.atasNama);
  const usahaTrx = trx.filter(t => t.category === "usaha");
  const usahaIncome = usahaTrx.filter(t => t.amount > 0).reduce((a,b) => a + b.amount, 0);
  return { trx, cleanTrx, totalKredit, totalDebit, avgKredit, avgIncome, monthlySurplus, positiveSurplusCount, surplusStable, maxSurplus, minSurplus, angsuranPerMonth, totalAngsuranPerMonth, dsr, utilityAvg, anomaliTrx, pinjolTrx, pinjolCount, selfTransferTrx, totalSelfTransfer, atasNamaTrx, usahaTrx, usahaIncome };
}

function buildInsights(k, analysis) {
  const insights = [];
  if (!k || !analysis.trx) return insights;
  if (k.profesi === "karyawan") {
    insights.push({ color: "var(--green-500)", text: "Gaji tetap " + formatRp(k.income) + "/bulan dari " + k.employer + " terdeteksi melalui keyword GAJI dan nama perusahaan - " + k.months + " bulan konsisten." });
  } else if (k.profesi === "wiraswasta") {
    insights.push({ color: "var(--green-500)", text: "Profesi wiraswasta (" + k.bidangUsaha + "). Transaksi usaha diidentifikasi dari data supplier/klien ONE ME: " + (k.suppliers||[]).join(", ") + ". Rata-rata omset masuk " + formatRp(analysis.usahaIncome / k.months) + "/bulan." });
  }
  if (analysis.positiveSurplusCount >= 2) {
    insights.push({ color: "var(--green-500)", text: "Cashflow positif - surplus positif " + analysis.positiveSurplusCount + " dari " + k.months + " bulan. Surplus per bulan: " + analysis.monthlySurplus.map((s,i) => "Bln " + (i+1) + ": " + (s >= 0 ? "+" : "") + formatRp(s)).join(", ") + "." });
  } else {
    insights.push({ color: "var(--red-500)", text: "Cashflow negatif - hanya " + analysis.positiveSurplusCount + " dari " + k.months + " bulan surplus positif. Surplus per bulan: " + analysis.monthlySurplus.map((s,i) => "Bln " + (i+1) + ": " + (s >= 0 ? "+" : "") + formatRp(s)).join(", ") + "." });
  }
  if (!analysis.surplusStable) {
    insights.push({ color: "var(--amber-500)", text: "Stabilitas surplus tidak konsisten. Variasi signifikan: surplus tertinggi " + formatRp(analysis.maxSurplus) + " vs terendah " + formatRp(analysis.minSurplus) + ". Perlu diperhatikan kemampuan bayar jangka panjang." });
  } else if (analysis.positiveSurplusCount >= 2) {
    insights.push({ color: "var(--green-500)", text: "Stabilitas surplus konsisten antar bulan - variasi dalam batas wajar." });
  }
  if (k.scenario === "window_dressing") {
    insights.push({ color: "var(--red-500)", text: "Indikasi Window Dressing: self-transfer besar (total " + formatRp(analysis.totalSelfTransfer) + ") masuk dan keluar berdekatan di akhir bulan. Difilter dari kalkulasi income." });
  } else if (analysis.selfTransferTrx.length > 0) {
    insights.push({ color: "var(--amber-500)", text: "Self-transfer terdeteksi dan difilter dari kalkulasi income." });
  }
  if (analysis.totalAngsuranPerMonth > 0) {
    insights.push({ color: analysis.dsr > 50 ? "var(--red-500)" : analysis.dsr > 40 ? "var(--amber-500)" : "var(--green-500)", text: "Total angsuran terdeteksi = " + formatRp(analysis.totalAngsuranPerMonth) + "/bulan = " + analysis.dsr + "% dari total penghasilan " + formatRp(k.income) + "/bulan." });
  }
  if (analysis.angsuranPerMonth.length > 0) {
    insights.push({ color: "var(--amber-500)", text: "Terdeteksi " + analysis.angsuranPerMonth.length + " cicilan di tempat lain. Harap periksa dan verifikasi kembali di SLIK." });
  }
  if (analysis.pinjolCount > 0) {
    insights.push({ color: "var(--red-500)", text: analysis.pinjolCount + " transaksi Pinjol (DANACEPAT) terdeteksi. Pinjaman Online (Pinjol) menunjukkan konsumen menggunakan layanan pinjaman berbasis aplikasi. Ini merupakan indikasi over-leverage, yaitu kondisi dimana total kewajiban/utang konsumen melebihi kemampuan bayar berdasarkan penghasilan. Risiko gagal bayar lebih tinggi." });
  }
  analysis.anomaliTrx.forEach(t => {
    insights.push({ color: "var(--red-500)", text: "Anomali transaksi: " + t.desc + " sebesar " + formatRp(t.amount) + " pada " + t.date + ". Transaksi jumlah besar tanpa keterangan jelas - perlu klarifikasi sumber dana." });
  });
  if (k.scenario === "atas_nama" && analysis.atasNamaTrx.length > 0) {
    insights.push({ color: "var(--red-500)", text: "Indikasi angsuran PT BCA Finance dibayarkan pihak lain: Transfer masuk dari DARMAWAN SUSILO 3 bulan berturut-turut (Jan, Feb, Mar) dengan nominal " + formatRp(4500000) + " - " + formatRp(5000000) + ", masing-masing 3 hari sebelum autodebet angsuran BCA Finance " + formatRp(4500000) + "/bulan." });
  }
  if (analysis.utilityAvg.length > 0) {
    const utilDesc = analysis.utilityAvg.map(u => {
      const label = u.type === "listrik" ? "PLN (ID Pel: " + u.idPelanggan + ")" : u.type === "pdam" ? "PDAM (ID Pel: " + u.idPelanggan + ")" : "Pulsa";
      return label + " avg " + formatRp(u.avgPerMonth) + "/bln";
    }).join(", ");
    insights.push({ color: "var(--blue-600)", text: "Pembayaran utilitas terdeteksi: " + utilDesc + "." });
  }
  if (k.scenario === "over_leverage") {
    insights.push({ color: "var(--red-500)", text: "OVER-LEVERAGE: Total kewajiban angsuran " + formatRp(analysis.totalAngsuranPerMonth) + "/bulan melebihi kemampuan bayar " + formatRp(k.income) + "/bulan. DSR " + analysis.dsr + "% jauh melebihi batas wajar. Risiko gagal bayar sangat tinggi." });
  }
  return insights;
}

function UploadScreen({ onNavigate, onUploadComplete }) {
  const currentUser = useContext(UserContext);
  const konsumenDB = buildKonsumenDB(currentUser.branches);
  const [searchQuery, setSearchQuery] = useState("");

  const [searching, setSearching] = useState(false);
  const MONTHS = ["Januari 2025", "Februari 2025", "Maret 2025", "April 2025", "Mei 2025", "Juni 2025"];
  // Separate upload states for konsumen and pasangan
  const [konsumenFiles, setKonsumenFiles] = useState({});
  const [pasanganFiles, setPasanganFiles] = useState({});
  const [uploadKonsumen, setUploadKonsumen] = useState(false);
  const [uploadPasangan, setUploadPasangan] = useState(false);

  function handleSearch() {
    if (!searchQuery.trim()) return;
    setSearching(true);
    setFoundKonsumen(null);
    setKonsumenFiles({});
    setPasanganFiles({});
    setUploadKonsumen(false);
    setUploadPasangan(false);
    setTimeout(() => {
      const q = searchQuery.trim();
      if (q === "1111111") {
        const baseK = konsumenDB[0] || ALL_KONSUMEN[0];
        const wrongK = { ...baseK, appId: "1111111", scenario: "wrong_account", wrongRekName: "BAMBANG SUSILO" };
        setFoundKonsumen(wrongK);
        setSearching(false);
        return;
      }
      let found = konsumenDB.find(k => k.appId === q || k.mid === q);
      if (!found && /^\d{7}$/.test(q)) {
        found = konsumenDB[Math.floor(Math.random() * konsumenDB.length)];
        found = { ...found, appId: q };
      }
      setFoundKonsumen(found || null);
      setSearching(false);
    }, 1200);
  }

  function toggleKFile(m) {
    setKonsumenFiles(prev => {
      if (prev[m]) { const n = { ...prev }; delete n[m]; return n; }
      const isJpg = Math.random() < 0.25; // 25% chance simulated JPG upload
      return { ...prev, [m]: { name: "mutasi_konsumen_" + m.replace(/ /g, "_").toLowerCase() + (isJpg ? ".jpg" : ".pdf"), size: (1.2 + Math.random() * 2).toFixed(1) + " MB", isJpg } };
    });
  }
  function togglePFile(m) {
    setPasanganFiles(prev => {
      if (prev[m]) { const n = { ...prev }; delete n[m]; return n; }

  const pCount = Object.keys(pasanganFiles).length;
  const totalUploaded = (uploadKonsumen ? kCount : 0) + (uploadPasangan ? pCount : 0);

        </div>
      </div>

      {foundKonsumen && (

          <div className="card" style={{ borderColor: "var(--green-500)", borderWidth: 2 }}>

          </div>

          {/* Upload Grid - Konsumen */}

                  return (<div key={m} className={`upload-slot ${f ? "filled" : ""}`} onClick={() => toggleKFile(m)}><div className="slot-label">{m}</div>{f ? <div className="slot-info">Uploaded - {f.size}</div> : <div className="slot-info">Klik untuk upload</div>}</div>);
                })}

            </div>
          )}

          {/* Upload Grid - Pasangan */}

            <div className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div className="section-label" style={{ marginBottom: 0 }}>Mutasi Rekening {foundKonsumen.pasangan}</div>
                <span className={`badge ${pCount >= 1 ? "badge-green" : "badge-blue"}`}>{pCount} file</span>
              </div>
              <div style={{ fontSize: 11, color: "var(--gray-500)", marginBottom: 14 }}>Pilih bulan yang tersedia</div>
              <div className="upload-grid">

                  return (<div key={m} className={`upload-slot ${f ? "filled" : ""}`} onClick={() => togglePFile(m)}><div className="slot-label">{m}</div>{f ? <div className="slot-info">Uploaded - {f.size}</div> : <div className="slot-info">Klik untuk upload</div>}</div>);

                <span style={{ fontSize: 16, flexShrink: 0 }}>⚠️</span>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--amber-600)" }}>Data Hanya 1 Bulan</div>

                </div>
              </div>
            </div>

          {uploadKonsumen && Object.values(konsumenFiles).some(f => f.isJpg) && (

                <span style={{ fontSize: 16, flexShrink: 0 }}>ℹ️</span>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--blue-600)" }}>Format JPG Terdeteksi</div>

                    File yang diupload berformat <strong>JPG / gambar</strong>. FINA AI <strong>tidak dapat menganalisa metadata PDF source</strong> dari format ini (termasuk CreationDate, Producer, dan Checksum digital). Namun, keaslian dokumen tetap dapat diverifikasi melalui parameter lain seperti: konsistensi font dan tipografi, pola transaksi, format layout, dan konsistensi nominal secara visual. Disarankan menggunakan file <strong>PDF langsung dari e-banking</strong> untuk hasil verifikasi yang lebih komprehensif.
                  </div>
                </div>
              </div>
            </div>
          )}
          <button className="btn-primary" onClick={() => {
            if (!canProceed) return;
            const allKFiles = Object.values(konsumenFiles);
            const hasJpg = allKFiles.some(f => f.isJpg);
            const meta = { ...foundKonsumen, months: Math.max(kCount, pCount, 3), uploadKonsumen, uploadPasangan, kCount, pCount, hasJpg };
            onUploadComplete(meta);
          }} disabled={!canProceed}>
            Mulai Verifikasi dan Analisa ({uploadKonsumen ? kCount : 0}{uploadPasangan ? " + " + pCount : ""} file)
          </button>
        </>
      )}
    </div>
  );
}

   VERIFICATION SCREEN
   ================================================================ */
function VerifResultCard({ k, flagCount, isAuthentic, isJpg }) {
  const [expanded, setExpanded] = useState(false);

  const metadataScore = isJpg ? null : 96;
  const fontScore = 93;
  const checksumScore = isJpg ? null : 98;
  const patternScore = flagCount > 0 ? 72 : 91;
  const validScores = [metadataScore, fontScore, checksumScore, patternScore].filter(s => s !== null);
  const overallScore = Math.round(validScores.reduce((a,b) => a+b, 0) / validScores.length * 10) / 10;

  const summaryParams = [
    ["Integritas Metadata", isJpg ? "N/A (JPG)" : "Valid", isJpg ? "var(--gray-400)" : "var(--green-600)"],
    ["Konsistensi Font", "Asli", "var(--green-600)"],
    ["Checksum Angka", isJpg ? "N/A (JPG)" : "Sesuai", isJpg ? "var(--gray-400)" : "var(--green-600)"],
    ["Pola Transaksi", flagCount > 0 ? flagCount + " Flag" : "Normal", flagCount > 0 ? "var(--amber-600)" : "var(--green-600)"],
  ];

  const detailParams = isJpg ? [
    { category: "Format File (JPG)", score: 60, items: [
      { label: "Format File", value: "JPG / Image - Metadata PDF tidak tersedia", status: "warn" },
      { label: "Verifikasi Source", value: "Tidak dapat diverifikasi (bukan PDF asli)", status: "fail" },
    ]},
    { category: "Konsistensi Font", score: fontScore, items: [
      { label: "Font & Tipografi", value: "Konsisten dengan format standar perbankan", status: "pass" },
      { label: "Format Header Rekening", value: "Sesuai format standar mutasi", status: "pass" },
    ]},
    { category: "Pola Transaksi", score: patternScore, items: [
      { label: "Konsistensi Nominal", value: "Lulus (Visual)", status: "pass" },
      { label: "Pola Transaksi", value: flagCount > 0 ? flagCount + " transaksi mencurigakan" : "Normal", status: flagCount > 0 ? "fail" : "pass" },
    ]},
  ] : [
    { category: "Integritas Metadata", score: metadataScore, items: [
      { label: "PDF Producer", value: k ? "Bank " + k.bank + " e-Statement" : "Bank BCA e-Statement", status: "pass" },
      { label: "Creation Date", value: "Konsisten dengan periode", status: "pass" },
      { label: "Modification History", value: "Tidak ada modifikasi", status: "pass" },
      { label: "Digital Signature", value: "Terverifikasi", status: "pass" },
    ]},
    { category: "Konsistensi Font", score: fontScore, items: [
      { label: "Font Family", value: "Seragam (Arial/Helvetica)", status: "pass" },
      { label: "Font Size Variance", value: "Normal (< 0.5pt)", status: "pass" },
      { label: "Embedding Type", value: "Subset embedded", status: "pass" },
      { label: "Anomali Karakter", value: "Tidak ditemukan", status: "pass" },
    ]},
    { category: "Checksum Angka", score: checksumScore, items: [
      { label: "Saldo Awal vs Akhir", value: "Cocok semua bulan", status: "pass" },
      { label: "Total Debit/Kredit", value: "Sesuai dengan saldo", status: "pass" },
      { label: "Running Balance", value: "Kalkulasi benar", status: "pass" },
    ]},
    { category: "Pola Transaksi", score: patternScore, items: [
      { label: "Window Dressing", value: k?.scenario === "window_dressing" ? "Terdeteksi!" : "Tidak terdeteksi", status: k?.scenario === "window_dressing" ? "fail" : "pass" },
      { label: "Self-Transfer", value: "Terdeteksi & difilter", status: "warn" },
      { label: "Pinjol / P2P Lending", value: flagCount > 0 ? flagCount + " transaksi terdeteksi" : "Tidak terdeteksi", status: flagCount > 0 ? "fail" : "pass" },
      { label: "Frekuensi Abnormal", value: "Normal", status: "pass" },
    ]},
  ];

  return (
    <div className={`verif-result ${isAuthentic ? "authentic" : "manipulated"}`} style={{ animation: "fadeUp 0.35s ease" }}>
      <div className="verif-result-header">
        <div className={`verif-icon ${isAuthentic ? "pass" : "fail"}`}>{isAuthentic ? "\u2713" : "\u2717"}</div>
        <div>
          <div style={{ fontSize: 16, fontWeight: 800, color: isAuthentic ? "var(--green-600)" : "var(--red-600)" }}>
            {isAuthentic ? "DOKUMEN ASLI / AUTHENTIC" : "INDIKASI MANIPULASI"}
          </div>
          <div style={{ fontSize: 11, color: "var(--gray-500)" }}>Confidence Score: {overallScore}% {isJpg ? "(Format JPG - Parameter terbatas)" : ""}</div>
        </div>
      </div>

      <div className="verif-grid">
        {summaryParams.map(([l, v, col], i) => (
          <div key={i} className="verif-cell">
            <div className="verif-cell-label">{l}</div>
            <div className="verif-cell-val" style={{ color: col }}>{v}</div>
          </div>
        ))}
      </div>

      {expanded && (
        <div style={{ marginTop: 16, animation: "fadeUp 0.3s ease" }}>
          {detailParams.map((cat, ci) => (
            <div key={ci} style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--gray-700)", textTransform: "uppercase", letterSpacing: "0.5px" }}>{cat.category}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: cat.score >= 90 ? "var(--green-600)" : cat.score >= 75 ? "var(--amber-600)" : "var(--red-600)" }}>{cat.score}%</div>
              </div>
              {cat.items.map((item, ii) => (
                <div key={ii} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 10px", background: "rgba(255,255,255,0.7)", borderRadius: "var(--radius-sm)", marginBottom: 4, borderLeft: "3px solid " + (item.status === "pass" ? "var(--green-500)" : item.status === "warn" ? "var(--amber-500)" : "var(--red-500)") }}>
                  <div style={{ fontSize: 11, color: "var(--gray-600)" }}>{item.label}</div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: item.status === "pass" ? "var(--green-600)" : item.status === "warn" ? "var(--amber-600)" : "var(--red-600)" }}>{item.value}</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      <button onClick={() => setExpanded(v => !v)} style={{
        width: "100%", marginTop: 14, padding: "10px 16px", borderRadius: "var(--radius-md)",
        border: isAuthentic ? "1px solid #a7f3d0" : "1px solid #fecaca", background: expanded ? "rgba(255,255,255,0.7)" : isAuthentic ? "rgba(5,150,105,0.08)" : "rgba(220,38,38,0.08)",
        color: isAuthentic ? "var(--green-600)" : "var(--red-600)", fontWeight: 700, fontSize: 12, cursor: "pointer",
        fontFamily: "var(--font)", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 6
      }}>
        {expanded ? "Sembunyikan Detail" : "Lihat Lebih Lengkap"}
        <span style={{ fontSize: 10, transition: "transform 0.2s", transform: expanded ? "rotate(180deg)" : "rotate(0deg)" }}>{"\u25BC"}</span>
      </button>
    </div>
  );
}

function VerificationScreen({ onNavigate, konsumen }) {
  const k = konsumen;
  const isWrongAccount = k?.scenario === "wrong_account";
  const isJpg = k?.hasJpg || false;
  const [step, setStep] = useState(0);
  const steps = isWrongAccount ? [
    "Membaca format dokumen",
    "OCR - ekstraksi teks dan angka",
    "Verifikasi kepemilikan rekening",
  ] : isJpg ? [
    "Membaca format file JPG / gambar",
    "OCR - ekstraksi teks dari gambar",
    "Verifikasi kepemilikan rekening",
    "Analisis konsistensi font & tipografi",
    "Pengecekan pola transaksi visual",
    "Deteksi anomali transaksi",
    "Filter transaksi self-transfer dan window dressing",
    "Identifikasi transaksi usaha",
    "Menghasilkan laporan verifikasi (metadata PDF terbatas)",
  ] : [
    "Membaca format dokumen PDF",
    "OCR - ekstraksi teks dan angka",
    "Verifikasi kepemilikan rekening",
    "Analisis metadata dokumen",
    "Deteksi manipulasi dan anomali font",
    "Validasi struktur mutasi rekening",
    "Filter transaksi self-transfer dan window dressing",
    "Identifikasi transaksi usaha",
    "Menghasilkan laporan verifikasi",
  ];

  useEffect(() => { setStep(0); }, [k && k.id]);
  useEffect(() => {
    if (isWrongAccount && step === 2) { const t = setTimeout(() => setStep(s => s + 1), 1200); return () => clearTimeout(t); }
    if (step < steps.length) { const t = setTimeout(() => setStep(s => s + 1), 700); return () => clearTimeout(t); }
  }, [step]);

  const done = isWrongAccount ? step >= 3 : step >= steps.length;
  const failed = isWrongAccount && done;
  const flagCount = k ? (k.scenario === "pinjol_kpr" ? 4 : 0) : 0;

  return (
    <div className="page">
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 20, fontWeight: 800 }} className="page-header">Verifikasi Dokumen</div>
        <div style={{ fontSize: 12, color: "var(--gray-500)", marginTop: 3 }}>AI Document Verification & OCR</div>
      </div>
      <div className="card" style={{ display: "flex", gap: 14, alignItems: "center" }}>
        <div style={{ width: 44, height: 44, borderRadius: "var(--radius-md)", background: isJpg ? "#fef3c7" : "var(--red-100)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, color: isJpg ? "var(--amber-600)" : "var(--red-500)", flexShrink: 0 }}>{isJpg ? "JPG" : "PDF"}</div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>mutasi_{k ? k.name.toLowerCase().replace(/ /g, "_") : "konsumen"}.{isJpg ? "jpg" : "pdf"}</div>
          <div style={{ fontSize: 11, color: "var(--gray-500)" }}>{k ? (k.kCount || k.months) : 3} file - Bank {k ? k.bank : "BCA"}{isJpg ? " - ⚠️ Format JPG" : ""}</div>
        </div>
      </div>
      <div className="card">
        <div className="section-label">Proses Verifikasi AI</div>
        {steps.map((s, i) => {
          let dotClass = "pending"; let textClass = "";
          if (failed && i === 2) { dotClass = "failed"; textClass = "failed"; }
          else if (i < step) { dotClass = "done"; textClass = "done"; }
          else if (i === step) dotClass = "active";
          return (<div key={i} className="step-row"><div className={`step-dot ${dotClass}`}>{failed && i === 2 ? "\u2717" : i < step ? "\u2713" : i + 1}</div><div className={`step-text ${textClass}`}>{s}</div></div>);
        })}
      </div>
      {failed && (
        <>
          <div className="verif-result manipulated" style={{ animation: "fadeUp 0.35s ease" }}>
            <div className="verif-result-header">
              <div className="verif-icon fail">{"\u2717"}</div>
              <div><div style={{ fontSize: 16, fontWeight: 800, color: "var(--red-600)" }}>VERIFIKASI GAGAL</div><div style={{ fontSize: 11, color: "var(--gray-500)" }}>Kepemilikan rekening tidak sesuai</div></div>
            </div>
            <div style={{ padding: 14, background: "rgba(255,255,255,0.7)", borderRadius: "var(--radius-md)", marginTop: 8 }}>
              <div style={{ fontSize: 12, color: "var(--gray-700)", lineHeight: 1.6 }}>
                <strong style={{ color: "var(--red-600)" }}>Nama di Mutasi:</strong> {k.wrongRekName}<br/>
                <strong style={{ color: "var(--blue-600)" }}>Nama Konsumen:</strong> {k.name}<br/>
                <strong style={{ color: "var(--blue-600)" }}>Nama Pasangan:</strong> {k.pasangan || "-"}<br/><br/>
                Nama pemilik rekening di mutasi (<strong>{k.wrongRekName}</strong>) tidak sesuai dengan nama konsumen, pasangan, atau PT milik konsumen. Dokumen tidak dapat diproses.
              </div>
            </div>
          </div>
          <button className="btn-primary" onClick={() => onNavigate("upload")} style={{ background: "linear-gradient(135deg, var(--gray-500), var(--gray-700))" }}>Kembali ke Upload</button>
        </>
      )}
      {done && !failed && (
        <>
          {k?.kCount === 1 && (
            <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: "var(--radius-md)", padding: "12px 14px", marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
                <span style={{ fontSize: 14, flexShrink: 0 }}>⚠️</span>
                <div style={{ fontSize: 11, color: "var(--gray-700)", lineHeight: 1.6 }}><strong style={{ color: "var(--amber-600)" }}>Data 1 Bulan:</strong> Analisa didasarkan pada mutasi <strong>1 bulan</strong> saja. Disarankan upload minimal 3 bulan untuk hasil yang lebih komprehensif.</div>
              </div>
            </div>
          )}
          <VerifResultCard k={k} flagCount={flagCount} isAuthentic={true} isJpg={isJpg} />
          {flagCount > 0 && (
            <div style={{ background: "var(--amber-100)", border: "1px solid #fde68a", borderRadius: "var(--radius-md)", padding: 14, marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--amber-600)" }}>{flagCount} FLAG TERDETEKSI</div>
              <div style={{ fontSize: 12, color: "var(--gray-700)", marginTop: 4 }}>Transaksi Pinjaman Online (Pinjol) terdeteksi. Perlu review.</div>
            </div>
          )}
          <button className="btn-primary" onClick={() => onNavigate("analysis")}>Lihat Hasil Analisa Lengkap</button>
        </>
      )}
    </div>
  );
}

function AnalysisPanel({ k, label, isCombined, combinedData }) {
  const analysis = isCombined ? combinedData : computeAnalysis(k);
  const trxData = analysis.trx || [];
  const insights = isCombined ? combinedData.insights : buildInsights(k, analysis);
  const [tab, setTab] = useState("summary");
  const [hideself, setHideself] = useState(true);
  const [showAngsuran, setShowAngsuran] = useState(false);
  const [showUtility, setShowUtility] = useState(false);
  const displayTrx = trxData.filter(t => hideself ? !t.selfTransfer : true);

  return (
    <div>
      {label && <div style={{ fontSize: 14, fontWeight: 800, color: "var(--blue-600)", marginBottom: 12, padding: "10px 14px", background: "var(--blue-50)", borderRadius: "var(--radius-md)", border: "1px solid var(--blue-100)" }}>{label}</div>}

      <div className="tabs">
        {[["summary", "Ringkasan"], ["transactions", "Transaksi"]].map(([id, lbl]) => (
          <button key={id} className={`tab-btn ${tab === id ? "active" : ""}`} onClick={() => setTab(id)}>{lbl}</button>
        ))}
      </div>

      {tab === "summary" && (
        <>
          {k.months < 3 && (
            <div style={{ background: "var(--amber-100)", border: "1px solid #fde68a", borderRadius: "var(--radius-lg)", padding: "14px 18px", marginBottom: 16, display: "flex", gap: 12 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--amber-600)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 900, fontSize: 14, flexShrink: 0 }}>!</div>
              <div><div style={{ fontSize: 13, fontWeight: 700, color: "var(--amber-600)" }}>Data Mutasi Hanya {k.months} Bulan</div><div style={{ fontSize: 12, color: "var(--gray-700)", marginTop: 3, lineHeight: 1.5 }}>Disarankan upload minimal 3 bulan.</div></div>
            </div>
          )}
          <div className="card" style={{ display: "flex", gap: 14, alignItems: "center", marginBottom: 16 }}>
            <div className="avatar-circle" style={{ width: 48, height: 48, fontSize: 18 }}>{k.name[0]}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>{k.name}</div>
              <div style={{ fontSize: 11, color: "var(--gray-500)" }}>{k.cabang} - Bank {k.bank} - No. Rek: {k.noRek}</div>
              <div style={{ fontSize: 11, color: "var(--gray-500)" }}>CMO: {k.cmo} | {k.profesi === "wiraswasta" ? "Wiraswasta - " + k.namaUsaha : "Karyawan - " + k.employer}</div>
            </div>
          </div>
          <div className="kpi-grid" style={{ marginBottom: 16 }}>
            {[
              ["Total Kredit (" + k.months + " bln)", formatRp(analysis.totalKredit), "var(--green-600)"],
              ["Avg Kredit / Bln", formatRp(analysis.avgKredit), "var(--green-600)"],
              ["Avg Income / Bln", formatRp(analysis.avgIncome), "var(--blue-600)"],
              ["Total Debit (" + k.months + " bln)", formatRp(analysis.totalDebit), "var(--red-600)"],
              ["Total Angsuran / Bln", formatRp(analysis.totalAngsuranPerMonth), "var(--amber-600)"],
              ["DSR (Debt Service Ratio)", analysis.dsr + "%", analysis.dsr > 50 ? "var(--red-600)" : analysis.dsr > 40 ? "var(--amber-600)" : "var(--green-600)"],
            ].map(([l, v, col], i) => (<div key={i} className="kpi-card"><div className="kpi-val" style={{ color: col }}>{v}</div><div className="kpi-label">{l}</div></div>))}
          </div>
          {analysis.angsuranPerMonth.length > 0 && (
            <div className="card" style={{ borderColor: "#fde68a" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--amber-600)" }}>Deteksi Angsuran di Tempat Lain</div>
                <button onClick={() => setShowAngsuran(v => !v)} style={{ background: "none", border: "none", color: "var(--blue-600)", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{showAngsuran ? "Sembunyikan" : "Lihat Detail"}</button>
              </div>
              <div style={{ fontSize: 11, color: "var(--gray-500)", marginBottom: showAngsuran ? 12 : 0 }}>ML mendeteksi otomatis dari keyword AUTODEBET / ANGSURAN</div>
              {showAngsuran && (
                <>
                  {analysis.angsuranPerMonth.map((a, i) => (<div key={i} className="angsuran-item"><div style={{ fontSize: 12, fontWeight: 600, color: "var(--gray-700)" }}>{a.label}</div><div style={{ color: "var(--red-600)", fontSize: 13, fontWeight: 700 }}>{formatRp(a.perMonth)} / bln</div></div>))}
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, paddingTop: 10, borderTop: "1px solid var(--gray-200)" }}>

                </>
              )}
            </div>
          )}
          {analysis.utilityAvg.length > 0 && (
            <div className="card" style={{ borderColor: "#bbf7d0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--green-600)" }}>Deteksi Pembayaran Utilitas</div>
                <button onClick={() => setShowUtility(v => !v)} style={{ background: "none", border: "none", color: "var(--blue-600)", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{showUtility ? "Sembunyikan" : "Lihat Detail"}</button>
              </div>

                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: "var(--radius-sm)", marginBottom: 6 }}>
                  <div><div style={{ fontSize: 12, fontWeight: 600, color: "var(--gray-700)" }}>{u.type === "listrik" ? "PLN / Listrik" : u.type === "pdam" ? "PDAM / Air" : "Pulsa / Telekomunikasi"}</div>{u.idPelanggan !== "-" && <div style={{ fontSize: 10, color: "var(--gray-500)" }}>ID Pelanggan: {u.idPelanggan}</div>}</div>
                  <div style={{ color: "var(--green-600)", fontSize: 13, fontWeight: 700 }}>{formatRp(u.avgPerMonth)} / bln</div>
                </div>
              ))}
            </div>
          )}
          <div className="card">
            <div className="section-label">AI Insights</div>
            {insights.map((ins, i) => (
              <div key={i} className="insight-row">
                <div className="insight-dot" style={{ background: ins.color }} />
                <div className="insight-text" style={{ color: ins.color === "var(--red-500)" ? "var(--red-600)" : ins.color === "var(--amber-500)" ? "var(--amber-600)" : ins.color === "var(--blue-600)" ? "var(--blue-600)" : "var(--gray-700)" }}>{ins.text}</div>
              </div>
            ))}
          </div>
        </>
      )}

      {tab === "transactions" && (
        <>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <button className={`filter-btn ${hideself ? "active" : ""}`} onClick={() => setHideself(v => !v)}>{hideself ? "Self-Transfer Disembunyikan" : "Tampilkan Semua"}</button>
          </div>
          {hideself && <div style={{ background: "var(--blue-100)", border: "1px solid #93c5fd", borderRadius: "var(--radius-md)", padding: "10px 14px", marginBottom: 14 }}><div style={{ fontSize: 11, fontWeight: 700, color: "var(--blue-600)" }}>Self-Transfer Filtering Aktif</div><div style={{ fontSize: 11, color: "var(--gray-500)", marginTop: 2 }}>Self-transfer difilter dari tampilan dan kalkulasi income.</div></div>}
          {displayTrx.map((t, i) => (
            <div key={i} className={`trx-row ${t.flag ? "flag" : t.angsuran ? "angsuran" : t.selfTransfer ? "self" : t.anomali ? "anomali" : t.utility ? "utility" : ""}`}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="trx-desc">
                  {t.flag && <span className="trx-tag" style={{ background: "var(--red-100)", color: "var(--red-600)" }}>PINJOL</span>}
                  {t.angsuran && <span className="trx-tag" style={{ background: "var(--amber-100)", color: "var(--amber-600)" }}>ANGSURAN</span>}
                  {t.selfTransfer && <span className="trx-tag" style={{ background: "var(--blue-100)", color: "var(--blue-600)" }}>SELF-TRANSFER</span>}
                  {t.anomali && <span className="trx-tag" style={{ background: "#f3e8ff", color: "#7c3aed" }}>ANOMALI</span>}
                  {t.utility && <span className="trx-tag" style={{ background: "var(--green-100)", color: "var(--green-600)" }}>{t.utility.toUpperCase()}</span>}
                  {t.atasNama && <span className="trx-tag" style={{ background: "#fef3c7", color: "#92400e" }}>ATAS NAMA?</span>}
                  {t.category === "usaha" && <span className="trx-tag" style={{ background: "#dbeafe", color: "#1e40af" }}>USAHA</span>}
                  {t.category === "gaji" && <span className="trx-tag" style={{ background: "var(--green-100)", color: "var(--green-600)" }}>GAJI</span>}
                  {t.desc}
                </div>
                <div className="trx-date">{t.date}</div>
              </div>
              <div className="trx-amount" style={{ color: t.amount > 0 ? "var(--green-600)" : "var(--red-600)" }}>{t.amount > 0 ? "+" : "-"}{formatRp(t.amount)}</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ================================================================
   ANALYSIS SCREEN - with separate konsumen/pasangan + combined view
   ================================================================ */
function AnalysisScreen({ konsumen, onNavigate }) {
  const k = konsumen;
  if (!k) return null;

  const hasPasangan = k.uploadPasangan;
  const hasKonsumen = k.uploadKonsumen !== false;

  // For demo: pasangan gets same scenario data but labeled differently
  const [activeView, setActiveView] = useState("konsumen");
  const [showOneMeModal, setShowOneMeModal] = useState(false);
  const [oneMeSuccess, setOneMeSuccess] = useState(false);

  // Build combined analysis
  const kAnalysis = computeAnalysis(k);
  const kInsights = buildInsights(k, kAnalysis);

  // For pasangan: create a simulated pasangan konsumen object
  const pasanganK = hasPasangan ? {
    ...k, name: k.pasangan, noRek: "9999888877", namaRek: (k.pasangan || "").toUpperCase(),
    income: Math.round(k.income * 0.7), scenario: "karyawan_gaji",
    employer: "PT Pasangan Sejahtera", jabatan: "Staff", profesi: "karyawan",
  } : null;

  const pAnalysis = pasanganK ? computeAnalysis(pasanganK) : null;
  const pInsights = pasanganK ? buildInsights(pasanganK, pAnalysis) : [];

  // Combined analysis
  const combinedData = (hasPasangan && pAnalysis) ? {
    trx: [...kAnalysis.trx, ...(pAnalysis.trx || [])].sort((a,b) => a.date.localeCompare(b.date)),
    totalKredit: kAnalysis.totalKredit + (pAnalysis.totalKredit || 0),
    totalDebit: kAnalysis.totalDebit + (pAnalysis.totalDebit || 0),
    avgKredit: kAnalysis.avgKredit + (pAnalysis.avgKredit || 0),
    avgIncome: k.income + (pasanganK?.income || 0),
    monthlySurplus: kAnalysis.monthlySurplus.map((s, i) => s + (pAnalysis.monthlySurplus?.[i] || 0)),
    positiveSurplusCount: kAnalysis.monthlySurplus.map((s, i) => s + (pAnalysis.monthlySurplus?.[i] || 0)).filter(s => s > 0).length,
    surplusStable: true,
    maxSurplus: 0, minSurplus: 0,
    angsuranPerMonth: [...kAnalysis.angsuranPerMonth, ...(pAnalysis.angsuranPerMonth || [])],
    totalAngsuranPerMonth: kAnalysis.totalAngsuranPerMonth + (pAnalysis.totalAngsuranPerMonth || 0),
    dsr: Math.round(((kAnalysis.totalAngsuranPerMonth + (pAnalysis.totalAngsuranPerMonth || 0)) / (k.income + (pasanganK?.income || 0))) * 100),
    utilityAvg: [...kAnalysis.utilityAvg, ...(pAnalysis.utilityAvg || [])],
    anomaliTrx: [...kAnalysis.anomaliTrx, ...(pAnalysis.anomaliTrx || [])],
    pinjolTrx: [...kAnalysis.pinjolTrx, ...(pAnalysis.pinjolTrx || [])],
    pinjolCount: kAnalysis.pinjolCount + (pAnalysis.pinjolCount || 0),
    selfTransferTrx: [...kAnalysis.selfTransferTrx, ...(pAnalysis.selfTransferTrx || [])],
    totalSelfTransfer: kAnalysis.totalSelfTransfer + (pAnalysis.totalSelfTransfer || 0),
    atasNamaTrx: [...kAnalysis.atasNamaTrx, ...(pAnalysis.atasNamaTrx || [])],
    usahaTrx: [...kAnalysis.usahaTrx, ...(pAnalysis.usahaTrx || [])],
    usahaIncome: kAnalysis.usahaIncome + (pAnalysis.usahaIncome || 0),
    insights: [...kInsights, { color: "var(--blue-600)", text: "Analisa gabungan: Total penghasilan gabungan konsumen + pasangan = " + formatRp(k.income + (pasanganK?.income || 0)) + "/bulan. DSR gabungan = " + Math.round(((kAnalysis.totalAngsuranPerMonth + (pAnalysis.totalAngsuranPerMonth || 0)) / (k.income + (pasanganK?.income || 0))) * 100) + "%." }],
  } : null;

  const combinedK = hasPasangan ? { ...k, name: k.name + " & " + k.pasangan, income: k.income + (pasanganK?.income || 0) } : null;

  const views = [];
  if (hasKonsumen) views.push({ id: "konsumen", label: "Rek. " + k.name });
  if (hasPasangan) views.push({ id: "pasangan", label: "Rek. " + k.pasangan });
  if (hasKonsumen && hasPasangan) views.push({ id: "gabungan", label: "Analisa Gabungan" });

  return (
    <div>
      <div style={{ padding: "16px 20px 0", background: "var(--white)", borderBottom: "1px solid var(--gray-200)", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <button onClick={() => onNavigate("dashboard")} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "var(--blue-600)", fontSize: 12, fontWeight: 700, cursor: "pointer", padding: "4px 0", marginBottom: 8, fontFamily: "var(--font)" }}>&#8592; Kembali ke Dashboard</button>
          <div style={{ fontSize: 18, fontWeight: 800 }}>Analisa Keuangan AI</div>
          <div style={{ fontSize: 12, color: "var(--gray-500)", marginBottom: 12 }}>{k.name} - {k.cabang} - Januari s.d. Maret 2025</div>
          {views.length > 1 && (
            <div className="analysis-tab-bar">
              {views.map(v => (
                <button key={v.id} className={activeView === v.id ? "active" : ""} onClick={() => setActiveView(v.id)}>{v.label}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="page" style={{ paddingTop: 18 }}>
        {activeView === "konsumen" && hasKonsumen && <AnalysisPanel k={k} />}
        {activeView === "pasangan" && hasPasangan && pasanganK && <AnalysisPanel k={pasanganK} label={"Analisa Rekening Pasangan: " + k.pasangan} />}
        {activeView === "gabungan" && combinedData && combinedK && <AnalysisPanel k={combinedK} label="Analisa Gabungan Konsumen + Pasangan" isCombined={true} combinedData={combinedData} />}

        <button className="btn-gold" onClick={() => setShowOneMeModal(true)} style={{ marginTop: 16 }}>Lanjutkan Aplikasi ke ONE ME</button>

        {showOneMeModal && (
          <div className="modal-overlay" onClick={() => { setShowOneMeModal(false); setOneMeSuccess(false); }}>
            <div className="modal-panel" style={{ maxWidth: 440, borderRadius: "var(--radius-xl)" }} onClick={e => e.stopPropagation()}>
              {!oneMeSuccess ? (
                <div style={{ padding: "32px 28px", textAlign: "center" }}>
                  <div style={{ width: 64, height: 64, borderRadius: 16, background: "linear-gradient(135deg, var(--gold-400), var(--gold-500))", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px", boxShadow: "0 6px 24px rgba(212,146,10,0.3)" }}><span style={{ fontSize: 28 }}>&#x2728;</span></div>
                  <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 6 }}>Lanjutkan ke ONE ME?</div>
                  <div style={{ fontSize: 13, color: "var(--gray-500)", lineHeight: 1.6, marginBottom: 24 }}>Data analisa keuangan <strong>{k.name}</strong> akan dikirim ke ONE ME.</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => { setShowOneMeModal(false); setOneMeSuccess(false); }} style={{ flex: 1, padding: "12px 16px", borderRadius: "var(--radius-md)", border: "1px solid var(--gray-200)", background: "var(--white)", color: "var(--gray-700)", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "var(--font)" }}>Batal</button>
                    <button onClick={() => setOneMeSuccess(true)} style={{ flex: 1, padding: "12px 16px", borderRadius: "var(--radius-md)", border: "none", background: "linear-gradient(135deg, var(--gold-400), var(--gold-500))", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "var(--font)" }}>Ya, Lanjutkan</button>
                  </div>
                </div>
              ) : (
                <div style={{ padding: "36px 28px", textAlign: "center" }}>
                  <div style={{ width: 64, height: 64, borderRadius: "50%", background: "var(--green-100)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 18px" }}><span style={{ fontSize: 30, color: "var(--green-600)" }}>&#10003;</span></div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "var(--green-600)", marginBottom: 6 }}>Berhasil Dikirim!</div>
                  <div style={{ fontSize: 13, color: "var(--gray-500)", lineHeight: 1.6, marginBottom: 24 }}>Data analisa <strong>{k.name}</strong> telah berhasil diupload ke ONE ME.</div>
                  <button onClick={() => { setShowOneMeModal(false); setOneMeSuccess(false); }} style={{ width: "100%", padding: "12px 16px", borderRadius: "var(--radius-md)", border: "none", background: "linear-gradient(135deg, var(--blue-600), var(--blue-700))", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "var(--font)" }}>Tutup</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   MAIN APP SHELL
   ================================================================ */
function App() {
  const [screen, setScreen] = useState("login");
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(TEAM_USERS[0]);
  const [selectedKonsumen, setSelectedKonsumen] = useState(null);

  const NAV = [
    { id: "dashboard", label: "Dashboard", letter: "D" },
    { id: "upload", label: "Upload", letter: "U" },
    ...(selectedKonsumen ? [{ id: "analysis", label: "Analisa", letter: "A" }] : []),
  ];

  function handleLogin() { const usr = TEAM_USERS[Math.floor(Math.random() * TEAM_USERS.length)]; setCurrentUser(usr); setLoggedIn(true); setScreen("dashboard"); }
  function handleSelectKonsumen(k) {
    if (k.scenario === "wrong_account") { setSelectedKonsumen(k); setScreen("verification"); return; }
    setSelectedKonsumen({ ...k, uploadKonsumen: true, uploadPasangan: false });
    setScreen("analysis");
  }
  function handleLogout() { setLoggedIn(false); setScreen("login"); setSelectedKonsumen(null); }
  function handleUploadComplete(k) { setSelectedKonsumen(k); setScreen("verification"); }

  if (!loggedIn) return <LoginScreen onLogin={handleLogin} />;

  return (
    <UserContext.Provider value={currentUser}>
      <div className={`app-shell ${loggedIn ? "logged-in" : ""}`}>
        <div className="sidebar">
          <div className="brand"><div className="brand-icon">FA</div><div><div className="brand-text">FINA <span>AI</span></div><div className="brand-sub">Financial INsight and Analysis</div></div></div>
          <div className="sidebar-nav">
            {NAV.map(n => (<button key={n.id} className={screen === n.id ? "active" : ""} onClick={() => setScreen(n.id)}><div className="nav-icon">{n.letter}</div>{n.label}</button>))}
          </div>
          <div className="sidebar-user" style={{ flexDirection: "column", alignItems: "stretch", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div className="avatar">{currentUser.name[0]}</div>
              <div style={{ flex: 1, minWidth: 0 }}><div className="uname">{currentUser.name}</div><div className="ubranch">{currentUser.branches.join(", ")}</div></div>
            </div>
            <button onClick={handleLogout} style={{ width: "100%", padding: "8px 12px", borderRadius: "var(--radius-sm)", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.7)", fontSize: 11, fontWeight: 600, cursor: "pointer", textAlign: "center" }}
              onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.12)"; e.currentTarget.style.color = "#fff"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.7)"; }}>Logout</button>
          </div>
        </div>
        <div className="topbar-mobile">
          <div className="brand-row"><div className="brand-icon-sm">FA</div><div className="brand-label">FINA <span>AI</span></div></div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center" }}><span className="status-dot" /><span className="status-text">Online</span></div>
            <button onClick={handleLogout} style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 6, color: "#fff", fontSize: 10, fontWeight: 600, padding: "5px 10px", cursor: "pointer" }}>Logout</button>
          </div>
        </div>
        <div className="main-content">
          {screen === "dashboard" && <DashboardScreen onNavigate={setScreen} onSelectKonsumen={handleSelectKonsumen} />}
          {screen === "upload" && <UploadScreen onNavigate={setScreen} onUploadComplete={handleUploadComplete} />}
          {screen === "verification" && <VerificationScreen onNavigate={setScreen} konsumen={selectedKonsumen} />}
          {screen === "analysis" && <AnalysisScreen konsumen={selectedKonsumen} onNavigate={setScreen} />}
        </div>
        <div className="bottom-nav">
          {NAV.map(n => (<button key={n.id} className={screen === n.id ? "active" : ""} onClick={() => setScreen(n.id)}><div className="nav-dot">{n.letter}</div><div className="nav-label">{n.label}</div></button>))}
        </div>
      </div>
    </UserContext.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<StrictMode><App /></StrictMode>);
</script>
</body>
</html>
