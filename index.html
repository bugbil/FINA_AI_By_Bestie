<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FINA AI - Financial INsight & Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue-900: #001d3d;
  --blue-800: #003068;
  --blue-700: #003f88;
  --blue-600: #005baa;
  --blue-500: #0072d6;
  --blue-400: #3d9be9;
  --blue-100: #e8f1fb;
  --blue-50: #f0f6ff;
  --gold-500: #d4920a;
  --gold-400: #F5A623;
  --gold-300: #ffc655;
  --green-600: #059669;
  --green-500: #0a7c5c;
  --green-100: #d1fae5;
  --red-600: #dc2626;
  --red-500: #d0021b;
  --red-100: #fee2e2;
  --amber-600: #d97706;
  --amber-500: #c87000;
  --amber-100: #fef3c7;
  --gray-900: #0f172a;
  --gray-700: #334155;
  --gray-500: #64748b;
  --gray-400: #94a3b8;
  --gray-300: #cbd5e1;
  --gray-200: #e2e8f0;
  --gray-100: #f1f5f9;
  --gray-50: #f8fafc;
  --white: #ffffff;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow-sm: 0 1px 3px rgba(0,31,61,0.06);
  --shadow-md: 0 4px 16px rgba(0,31,61,0.08);
  --shadow-lg: 0 8px 32px rgba(0,31,61,0.12);
  --shadow-xl: 0 12px 48px rgba(0,31,61,0.16);
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background: var(--gray-50); font-family: var(--font); color: var(--gray-900); }
input, button, select { font-family: inherit; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

/* ===== LAYOUT SHELL ===== */
.app-shell {
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Desktop: centered card with max-width */
@media (min-width: 768px) {
  .app-shell.logged-in {
    flex-direction: row;
  }
}

/* ===== SIDEBAR (Desktop only) ===== */
.sidebar {
  display: none;
}
@media (min-width: 768px) {
  .sidebar {
    display: flex;
    flex-direction: column;
    width: 260px;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--blue-800) 0%, var(--blue-900) 100%);
    padding: 28px 20px;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
  }
  .sidebar .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
  }
  .sidebar .brand-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    color: #fff;
  }
  .sidebar .brand-text {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1.5px;
  }
  .sidebar .brand-text span { color: var(--gold-400); }
  .sidebar .brand-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .sidebar-nav {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sidebar-nav button {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: var(--radius-md);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .sidebar-nav button:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.9);
  }
  .sidebar-nav button.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .sidebar-nav button .nav-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .sidebar-nav button.active .nav-icon {
    background: rgba(255,255,255,0.15);
  }
  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin-top: 20px;
  }
  .sidebar-user .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--blue-500);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 800;
    font-size: 14px;
  }
  .sidebar-user .uname {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
  }
  .sidebar-user .ubranch {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 1px;
  }
  .main-content {
    margin-left: 260px;
    flex: 1;
  }
}

@media (max-width: 767px) {
  .main-content {
    flex: 1;
    padding-bottom: 72px;
  }
}

/* ===== TOP BAR (Mobile only) ===== */
.topbar-mobile {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: var(--blue-700);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-mobile .brand-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-mobile .brand-icon-sm {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 10px;
  color: #fff;
}
.topbar-mobile .brand-label {
  font-size: 14px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 1px;
}
.topbar-mobile .brand-label span { color: var(--gold-400); }
.topbar-mobile .status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #34d399;
  margin-right: 5px;
  display: inline-block;
}
.topbar-mobile .status-text {
  font-size: 10px;
  color: rgba(255,255,255,0.8);
}
@media (min-width: 768px) {
  .topbar-mobile { display: none; }
}

/* ===== BOTTOM NAV (Mobile only) ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  display: flex;
  justify-content: center;
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
}
.bottom-nav button {
  flex: 1;
  max-width: 100px;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 4px;
}
.bottom-nav .nav-dot {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  transition: all 0.2s;
  color: var(--gray-400);
}
.bottom-nav button.active .nav-dot {
  background: var(--blue-100);
  color: var(--blue-600);
}
.bottom-nav .nav-label {
  font-size: 10px;
  color: var(--gray-400);
  font-weight: 500;
}
.bottom-nav button.active .nav-label {
  color: var(--blue-600);
  font-weight: 700;
}
@media (min-width: 768px) {
  .bottom-nav { display: none; }
}

/* ===== PAGE CONTAINER ===== */
.page {
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
  animation: fadeUp 0.35s ease;
}
@media (min-width: 768px) {
  .page { padding: 32px 40px; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== CARD ===== */
.card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
@media (min-width: 768px) {
  .card { padding: 24px; }
}

/* ===== SECTION LABEL ===== */
.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue-600);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ===== FORM FIELD ===== */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.field input, .field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--gray-900);
  background: var(--gray-50);
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus {
  border-color: var(--blue-400);
  background: var(--white);
}

/* ===== BUTTONS ===== */
.btn-primary {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
  border: none;
  color: #fff;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.25s;
  box-shadow: 0 4px 16px rgba(0,63,136,0.25);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,63,136,0.35); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-gold {
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
  border: none;
  color: #fff;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 16px rgba(212,146,10,0.25);
  transition: all 0.25s;
}
.btn-gold:hover { transform: translateY(-1px); }

/* ===== BADGE ===== */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.badge-green { background: var(--green-100); color: var(--green-600); }
.badge-red { background: var(--red-100); color: var(--red-600); }
.badge-amber { background: var(--amber-100); color: var(--amber-600); }
.badge-blue { background: var(--blue-100); color: var(--blue-600); }

/* ===== STAT GRID ===== */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 768px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
}
.stat-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  border-radius: 4px 0 0 4px;
}
.stat-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.stat-val { font-size: 28px; font-weight: 900; margin-bottom: 2px; }
.stat-label { font-size: 11px; color: var(--gray-500); font-weight: 500; }

/* ===== KPI GRID ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
}
.kpi-card {
  background: var(--gray-50);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  padding: 14px;
}
.kpi-val { font-size: 14px; font-weight: 800; }
.kpi-label { font-size: 10px; color: var(--gray-500); margin-top: 3px; }

/* ===== TABS ===== */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
  border-bottom: 2px solid var(--gray-200);
}
.tab-btn {
  padding: 10px 18px;
  border: none;
  background: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-400);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
}
.tab-btn.active {
  color: var(--blue-600);
  border-bottom-color: var(--blue-600);
}

/* ===== TRANSACTION ROW ===== */
.trx-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: var(--white);
  border: 1px solid var(--gray-200);
  transition: background 0.15s;
}
.trx-row:hover { background: var(--gray-50); }
.trx-row.flag { background: #fef2f2; border-color: #fecaca; }
.trx-row.angsuran { background: #fffbeb; border-color: #fde68a; }
.trx-row.self { background: #eff6ff; border-color: #bfdbfe; }
.trx-desc { font-size: 12px; font-weight: 500; color: var(--gray-700); }
.trx-date { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
.trx-amount { font-size: 13px; font-weight: 700; flex-shrink: 0; margin-left: 12px; }
.trx-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 6px;
  vertical-align: middle;
}

/* ===== VERIFICATION STEP ===== */
.step-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 14px;
}
.step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  flex-shrink: 0;
  color: #fff;
  transition: all 0.4s ease;
}
.step-dot.done { background: var(--green-500); }
.step-dot.active { background: var(--blue-600); animation: pulse 1.2s infinite; }
.step-dot.pending { background: var(--gray-300); }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,91,170,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(0,91,170,0); }
}
.step-text { font-size: 13px; padding-top: 4px; color: var(--gray-500); }
.step-text.done { color: var(--gray-700); font-weight: 600; }

/* ===== INSIGHT ROW ===== */
.insight-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
}
.insight-row:last-child { border-bottom: none; }
.insight-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.insight-text { font-size: 13px; font-weight: 500; line-height: 1.5; }

/* ===== UPLOAD SLOT ===== */
.upload-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 768px) {
  .upload-grid { grid-template-columns: repeat(3, 1fr); }
}
.upload-slot {
  border: 2px dashed var(--gray-300);
  border-radius: var(--radius-md);
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.upload-slot:hover { border-color: var(--blue-400); background: var(--blue-50); }
.upload-slot.filled {
  border-style: solid;
  border-color: var(--green-500);
  background: var(--green-100);
}
.upload-slot .slot-label {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 4px;
}
.upload-slot .slot-info {
  font-size: 10px;
  color: var(--gray-500);
}
.upload-slot.filled .slot-label { color: var(--green-600); }
.upload-slot.filled .slot-info { color: var(--green-500); }

/* ===== RECENT LIST ===== */
.recent-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.recent-item:hover { box-shadow: var(--shadow-sm); background: var(--gray-50); }
.avatar-circle {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s;
}
@media (min-width: 768px) {
  .modal-overlay { align-items: center; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-panel {
  background: var(--white);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.3s ease;
}
@media (min-width: 768px) {
  .modal-panel { border-radius: var(--radius-xl); }
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--gray-200);
}
.modal-body { overflow-y: auto; padding: 16px 20px; flex: 1; }
.modal-close {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--gray-400);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.modal-close:hover { background: var(--gray-100); }



/* ===== LOGIN ===== */
.login-screen {
  min-height: 100vh;
  width: 100%;
  background: linear-gradient(155deg, var(--blue-800) 0%, var(--blue-700) 40%, var(--blue-600) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.login-grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}
.login-glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,166,35,0.1) 0%, transparent 60%);
  top: -100px;
  right: -80px;
  pointer-events: none;
}
.login-container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 400px;
  padding: 0 24px;
}
.login-brand {
  text-align: center;
  margin-bottom: 36px;
}
.login-brand-row {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 10px;
}
.login-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 18px;
  color: #fff;
  backdrop-filter: blur(8px);
}
.login-title {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
}
.login-title span { color: var(--gold-400); }
.login-subtitle {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.login-tagline {
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  margin-top: 6px;
}
.login-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-xl);
  padding: 30px;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.login-field { margin-bottom: 20px; }
.login-field label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  margin-bottom: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.login-field input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-field input:focus { border-color: rgba(255,255,255,0.45); }
.login-field input::placeholder { color: rgba(255,255,255,0.3); }
.login-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
  border: none;
  color: #fff;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s;
  box-shadow: 0 4px 24px rgba(0,91,170,0.4);
  margin-top: 6px;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 32px rgba(0,91,170,0.5); }
.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.5px;
}

/* ===== VERIFICATION RESULT ===== */
.verif-result {
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
}
.verif-result.authentic {
  background: #ecfdf5;
  border: 1px solid #a7f3d0;
}
.verif-result.manipulated {
  background: #fef2f2;
  border: 1px solid #fecaca;
}
.verif-result-header {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
}
.verif-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 20px;
  color: #fff;
  flex-shrink: 0;
}
.verif-icon.pass { background: var(--green-500); }
.verif-icon.fail { background: var(--red-500); }
.verif-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.verif-cell {
  background: rgba(255,255,255,0.7);
  border-radius: var(--radius-sm);
  padding: 10px;
}
.verif-cell-label { font-size: 10px; color: var(--gray-500); }
.verif-cell-val { font-size: 12px; font-weight: 700; margin-top: 2px; }

/* ===== RESPONSIVE HELPERS ===== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (min-width: 768px) {
  .page-header { font-size: 22px !important; }
}

/* Angsuran collapsible */
.angsuran-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: #fffbeb;

/* Filter toggle */

  color: var(--gray-500);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active {
  border-color: var(--blue-600);
  background: var(--blue-100);
  color: var(--blue-600);
}

/* ================================================================
   VERIFICATION SCREEN
   ================================================================ */
function VerificationScreen({ onNavigate, konsumen }) {
  const k = konsumen;
  const [step, setStep] = useState(0);
  const steps = [
    "Membaca format dokumen PDF",
    "OCR - Ekstraksi teks dan angka",
    "Analisis metadata dokumen",
    "Deteksi manipulasi dan anomali font",
    "Validasi struktur mutasi rekening",
    "Filter transaksi self-transfer dan window dressing",
    "Menghasilkan laporan verifikasi",
  ];

  useEffect(() => {
    setStep(0);
  }, [k && k.id]);

  useEffect(() => {
    if (step < steps.length) {
      const t = setTimeout(() => setStep(s => s + 1), 700);
      return () => clearTimeout(t);
    }
  }, [step]);

  const done = step >= steps.length;
  const isAuthentic = !k || k.pinjol <= 1;
  const flagCount = k ? k.pinjol : 0;

  return (
    <div className="page">
      <div style={{ marginBottom: 22 }}>
        <div style={{ fontSize: 20, fontWeight: 800 }} className="page-header">Verifikasi Dokumen</div>
        <div style={{ fontSize: 12, color: "var(--gray-500)", marginTop: 3 }}>AI Document Verification</div>
      </div>

      <div className="card" style={{ display: "flex", gap: 14, alignItems: "center" }}>
        <div style={{ width: 44, height: 44, borderRadius: "var(--radius-md)", background: "var(--red-100)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, color: "var(--red-500)", flexShrink: 0 }}>PDF</div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600 }}>mutasi_{k ? k.name.toLowerCase().replace(/ /g, "_") : "konsumen"}.pdf</div>
          <div style={{ fontSize: 11, color: "var(--gray-500)" }}>{k ? k.months : 3} file - Bank {k ? k.bank : "BCA"} - Januari s.d. Maret 2025</div>
        </div>
      </div>

      <div className="card">
        <div className="section-label">Proses Verifikasi AI</div>
        {steps.map((s, i) => (
          <div key={i} className="step-row">
            <div className={`step-dot ${i < step ? "done" : i === step ? "active" : "pending"}`}>
              {i < step ? "\u2713" : i + 1}
            </div>
            <div className={`step-text ${i < step ? "done" : ""}`}>{s}</div>
          </div>
        ))}
      </div>

      {done && (
        <>
          <VerifResultCard k={k} flagCount={flagCount} isAuthentic={isAuthentic} />

          {flagCount > 0 && (
            <div style={{ background: "var(--amber-100)", border: "1px solid #fde68a", borderRadius: "var(--radius-md)", padding: 14, marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--amber-600)" }}>{flagCount} FLAG TERDETEKSI</div>
              <div style={{ fontSize: 12, color: "var(--gray-700)", marginTop: 4 }}>
                Transaksi terkait Pinjaman Online (Pinjol) terdeteksi. Perlu review lebih lanjut.
              </div>
            </div>
          )}

          <button className="btn-primary" onClick={() => onNavigate("analysis")}>
            Lihat Hasil Analisa Lengkap
          </button>
        </>
      )}
    </div>
  );
}

                        Data analisa <strong style={{ color: "var(--gray-700)" }}>{k ? k.name : ""}</strong> telah berhasil diupload ke ONE ME. Silakan lanjutkan proses di sistem ONE ME.
                      </div>
                      <button onClick={() => { setShowOneMeModal(false); setOneMeSuccess(false); }} style={{ width: "100%", padding: "12px 16px", borderRadius: "var(--radius-md)", border: "none", background: "linear-gradient(135deg, var(--blue-600), var(--blue-700))", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer", boxShadow: "0 4px 16px rgba(0,63,136,0.25)", fontFamily: "var(--font)" }}>Tutup</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </>
        )}

        {k && tab === "transactions" && (
          <>
            <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
              <button className={`filter-btn ${hideself ? "active" : ""}`} onClick={() => setHideself(v => !v)}>
                {hideself ? "Self-Transfer Disembunyikan" : "Tampilkan Self-Transfer"}
              </button>
            </div>

            {hideself && (
              <div style={{ background: "var(--blue-100)", border: "1px solid #93c5fd", borderRadius: "var(--radius-md)", padding: "10px 14px", marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--blue-600)" }}>Self-Transfer Filtering Aktif</div>
                <div style={{ fontSize: 11, color: "var(--gray-500)", marginTop: 2 }}>
                  Self-transfer (an. konsumen / pasangan) difilter dari tampilan dan kalkulasi income.
                </div>
              </div>
            )}

            {displayTrx.map((t, i) => (
              <div key={i} className={`trx-row ${t.flag ? "flag" : t.angsuran ? "angsuran" : t.selfTransfer ? "self" : ""}`}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="trx-desc">
                    {t.flag && <span className="trx-tag" style={{ background: "var(--red-100)", color: "var(--red-600)" }}>PINJOL</span>}
                    {t.angsuran && <span className="trx-tag" style={{ background: "var(--amber-100)", color: "var(--amber-600)" }}>ANGSURAN</span>}
                    {t.selfTransfer && <span className="trx-tag" style={{ background: "var(--blue-100)", color: "var(--blue-600)" }}>SELF-TRANSFER</span>}
                    {t.desc}
                  </div>
                  <div className="trx-date">{t.date}</div>
                </div>
                <div className="trx-amount" style={{ color: t.amount > 0 ? "var(--green-600)" : "var(--red-600)" }}>
                  {t.amount > 0 ? "+" : "-"}{formatRp(t.amount)}
                </div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   MAIN APP SHELL
   ================================================================ */
function App() {
  const [screen, setScreen] = useState("login");
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(TEAM_USERS[0]);
  const [selectedKonsumen, setSelectedKonsumen] = useState(null);

  const NAV = [
    { id: "dashboard", label: "Dashboard", letter: "D" },
    { id: "upload", label: "Upload", letter: "U" },
    ...(selectedKonsumen ? [{ id: "analysis", label: "Analisa", letter: "A" }] : []),
  ];

  const activeNav = screen;

  function handleLogin() {
    // Randomly pick a user for demo
    const usr = TEAM_USERS[Math.floor(Math.random() * TEAM_USERS.length)];
    setCurrentUser(usr);
    setLoggedIn(true);
    setScreen("dashboard");
  }

  function handleSelectKonsumen(k) {
    setSelectedKonsumen(k);
    setScreen("analysis");
  }

  function handleLogout() {
    setLoggedIn(false);
    setScreen("login");
    setSelectedKonsumen(null);
  }

  function handleUploadComplete(k) {
    setSelectedKonsumen(k);
    setScreen("verification");
  }

  if (!loggedIn) {
    return <LoginScreen onLogin={handleLogin} />;
  }

  return (
    <UserContext.Provider value={currentUser}>
      <div className={`app-shell ${loggedIn ? "logged-in" : ""}`}>

        {/* SIDEBAR - Desktop */}
        <div className="sidebar">
          <div className="brand">
            <div className="brand-icon">FA</div>
            <div>
              <div className="brand-text">FINA <span>AI</span></div>
              <div className="brand-sub">Financial INsight and Analysis</div>
            </div>
          </div>
          <div className="sidebar-nav">
            {NAV.map(n => (
              <button key={n.id} className={activeNav === n.id ? "active" : ""} onClick={() => setScreen(n.id)}>
                <div className="nav-icon">{n.letter}</div>
                {n.label}
              </button>
            ))}
          </div>
          <div className="sidebar-user" style={{ flexDirection: "column", alignItems: "stretch", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div className="avatar">{currentUser.name[0]}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div className="uname">{currentUser.name}</div>
                <div className="ubranch">{currentUser.branches.join(", ")}</div>
              </div>
            </div>
            <button onClick={handleLogout} style={{ width: "100%", padding: "8px 12px", borderRadius: "var(--radius-sm)", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.7)", fontSize: 11, fontWeight: 600, cursor: "pointer", transition: "all 0.2s", textAlign: "center" }}
              onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.12)"; e.currentTarget.style.color = "#fff"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.06)"; e.currentTarget.style.color = "rgba(255,255,255,0.7)"; }}>
              Logout
            </button>
          </div>
        </div>

        {/* TOPBAR - Mobile */}
        <div className="topbar-mobile">
          <div className="brand-row">
            <div className="brand-icon-sm">FA</div>
            <div className="brand-label">FINA <span>AI</span></div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              <span className="status-dot" />
              <span className="status-text">Online</span>
            </div>
            <button onClick={handleLogout} style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 6, color: "#fff", fontSize: 10, fontWeight: 600, padding: "5px 10px", cursor: "pointer" }}>Logout</button>
          </div>
        </div>

        {/* MAIN CONTENT */}
        <div className="main-content">
          {screen === "dashboard" && <DashboardScreen onNavigate={setScreen} onSelectKonsumen={handleSelectKonsumen} />}
          {screen === "upload" && <UploadScreen onNavigate={setScreen} onUploadComplete={handleUploadComplete} />}
          {screen === "verification" && <VerificationScreen onNavigate={setScreen} konsumen={selectedKonsumen} />}
          {screen === "analysis" && <AnalysisScreen konsumen={selectedKonsumen} onNavigate={setScreen} />}
        </div>

        {/* BOTTOM NAV - Mobile */}
        <div className="bottom-nav">
          {NAV.map(n => (
            <button key={n.id} className={activeNav === n.id ? "active" : ""} onClick={() => setScreen(n.id)}>
              <div className="nav-dot">{n.letter}</div>
              <div className="nav-label">{n.label}</div>
            </button>
          ))}
        </div>
      </div>
    </UserContext.Provider>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<StrictMode><App /></StrictMode>);
</script>
</body>
</html>
